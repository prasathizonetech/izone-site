version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: izone-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: izone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Prasa12345

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d izone"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: izone-backend
    restart: unless-stopped

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: izone-frontend
    restart: unless-stopped

    depends_on:
      - backend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  frontend_node_modules: